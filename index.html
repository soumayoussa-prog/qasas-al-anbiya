<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبة القصص الرقمية</title>
<style>
:root {
  --primary-green: #27ae60;
  --light-bg: #f4f7f9;
  --card-bg: rgba(255, 255, 255, 0.95);
  --text-dark: #2c3e50;
}

body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background-color: var(--light-bg);
    color: var(--text-dark);
    margin: 0;
    padding: 20px 15px 120px 15px;
    min-height: 100vh;
}

h1 {
    text-align: center;
    color: var(--primary-green);
    margin-bottom: 25px;
    font-size: 1.8em;
}

.controls {
    text-align: center;
    margin-bottom: 20px;
}

.controls button {
    background-color: var(--primary-green);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    margin: 5px;
    font-weight: bold;
    cursor: pointer;
}

#storiesList {
    max-width: 700px;
    margin: 0 auto;
}

.card-item {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    border-right: 4px solid var(--primary-green);
}

.card-item a {
    color: var(--text-dark);
    text-decoration: none;
    font-weight: bold;
    font-size: 1.1em;
    display: block;
    margin-bottom: 10px;
}

.interactions {
    display: flex;
    gap: 15px;
    font-size: 0.9em;
    color: #555;
    border-top: 1px solid #eee;
    padding-top: 8px;
}

.interactions span {
    cursor: pointer;
    transition: 0.2s;
}

.interactions span:hover {
    color: var(--primary-green);
}

.footer-watermark {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: rgba(44, 62, 80, 0.9);
    color: #ecf0f1;
    text-align: center;
    padding: 10px 5px;
    font-size: 0.85em;
    backdrop-filter: blur(6px);
    border-top: 2px solid var(--primary-green);
    z-index: 999;
}

.footer-watermark a {
    color: #2ecc71;
    text-decoration: none;
    margin: 0 6px;
    font-weight: bold;
}

.footer-name {
    display: block;
    margin-bottom: 4px;
    font-size: 0.95em;
}

.visitor-count {
    color: #f1c40f;
    font-weight: bold;
}
</style>
</head>
<body>

<h1>مكتبة القصص الرقمية</h1>

<div class="controls">
    <button onclick="setLang('ar')">العربية</button>
    <button onclick="setLang('en')">English</button>
</div>

<div id="statsBoard" class="dashboard"></div>
<div id="storiesList">جاري التحميل...</div>

<footer class="footer-watermark">
    <span class="footer-name">قندوز حسن - صنف 05</span>
    <span>© 2026 جميع الحقوق محفوظة</span> | 
    <a href="https://facebook.com" target="_blank">فيسبوك</a> | 
    <a href="https://instagram.com" target="_blank">انستغرام</a> | 
    <a href="https://wa.me/" target="_blank">واتساب</a> | 
    <span class="visitor-count">الزوار: <span id="visitorCount">جاري التحميل...</span></span>
</footer>

<script>
let storiesData = [];
let currentLang = 'ar';

async function updateVisitorCount() {
    try {
        const key = 'qisas-al-anbiya-visits';
        const response = await fetch(`https://api.counterapi.dev/v1/${key}/up`, {mode: 'cors'});
        const data = await response.json();
        document.getElementById('visitorCount').innerText = data.count.toLocaleString('ar-EG');
    } catch (e) {
        document.getElementById('visitorCount').innerText = '0';
    }
}

async function loadStories() {
    try {
        const response = await fetch('stories.json');
        storiesData = await response.json();
        renderStories();
        updateStats();
        updateVisitorCount();
    } catch (e) {
        document.getElementById('storiesList').innerHTML = 'خطأ في تحميل القصص. تأكد من وجود ملف stories.json';
    }
}

function renderStories(filter = 'all') {
    const list = document.getElementById('storiesList');
    let filtered = storiesData;
    
    if(filtered.length === 0) {
        list.innerHTML = '<p style="text-align:center">لا توجد قصص</p>';
        return;
    }
    
    list.innerHTML = filtered.map(story => {
        const title = currentLang === 'ar' ? story.title_ar : story.title_en;
        const isRead = localStorage.getItem('read_'+story.id);
        const likes = localStorage.getItem('like_'+story.id) || 0;
        const comments = localStorage.getItem('comment_'+story.id) || 0;
        
        return `
        <div class="card-item">
            <a href="${story.url}" target="_blank">${isRead ? '✓ ' : ''}${title}</a>
            <div class="interactions">
                <span onclick="likeStory('${story.id}')">👍 جام <span id="like_${story.id}">${likes}</span></span>
                <span onclick="commentStory('${story.id}')">💬 كومونت <span id="comment_${story.id}">${comments}</span></span>
                <span onclick="shareStory('${title}', '${story.url}')">📤 نشر</span>
            </div>
        </div>`;
    }).join('');
}

function updateStats() {
    const total = storiesData.length;
    const read = storiesData.filter(s => localStorage.getItem('read_'+s.id)).length;
    const percent = total > 0 ? Math.round((read/total)*100) : 0;
    document.getElementById('statsBoard').innerHTML = `
        <div style="text-align:center; background:var(--card-bg); padding:15px; border-radius:12px; margin-bottom:20px; border:2px solid var(--primary-green)">
            <strong>الإنجاز: ${percent}%</strong> | قرأت ${read} من ${total}
        </div>`;
}

function setLang(lang) {
    currentLang = lang;
    renderStories();
}

function likeStory(id) {
    let likes = parseInt(localStorage.getItem('like_'+id) || 0) + 1;
    localStorage.setItem('like_'+id, likes);
    document.getElementById('like_'+id).innerText = likes;
}

function commentStory(id) {
    let comment = prompt('اكتب تعليقك:');
    if(comment) {
        let comments = parseInt(localStorage.getItem('comment_'+id) || 0) + 1;
        localStorage.setItem('comment_'+id, comments);
        document.getElementById('comment_'+id).innerText = comments;
    }
}

function shareStory(title, url) {
    if(navigator.share) {
        navigator.share({title: title, url: url});
    } else {
        alert('انسخ الرابط: ' + url);
    }
}

document.addEventListener('click', function(e) {
    if(e.target.tagName === 'A' && e.target.href.includes('http')) {
        const id = e.target.href.split('/').pop();
        localStorage.setItem('read_'+id, 'true');
        setTimeout(() => { updateStats(); renderStories(); }, 500);
    }
});

loadStories();
</script>
</body>
</html>
